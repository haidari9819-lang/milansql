{{- if .Values.ssl.enabled }}
{{- if not .Values.ssl.secretName }}
# Auto-generate a placeholder TLS secret (replace with real cert in production)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "milansql.fullname" . }}-tls
  labels:
    {{- include "milansql.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
type: kubernetes.io/tls
data:
  # Replace these with base64-encoded real certificates
  tls.crt: ""
  tls.key: ""
{{- end }}
{{- end }}
