apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: milansqls.db.milansql.io
  labels:
    app.kubernetes.io/name: milansql
    app.kubernetes.io/part-of: milansql-operator
spec:
  group: db.milansql.io
  names:
    kind: MilanSQL
    plural: milansqls
    singular: milansql
    shortNames:
      - msql
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              replicas:
                type: integer
                default: 1
                minimum: 1
                maximum: 9
              version:
                type: string
                default: "5.7.0"
              storage:
                type: string
                default: "10Gi"
              resources:
                type: object
                properties:
                  memory:
                    type: string
                    default: "512Mi"
                  cpu:
                    type: string
                    default: "500m"
              ssl:
                type: boolean
                default: false
              replication:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  replicas:
                    type: integer
                    default: 1
                    minimum: 1
                    maximum: 5
          status:
            type: object
            properties:
              phase:
                type: string
              readyReplicas:
                type: integer
              masterEndpoint:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Version
      type: string
      jsonPath: .spec.version
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
