apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milansql
  labels:
    app: milansql
    app.kubernetes.io/name: milansql
    app.kubernetes.io/version: "5.7.0"
spec:
  serviceName: milansql-headless
  replicas: 1
  selector:
    matchLabels:
      app: milansql
  template:
    metadata:
      labels:
        app: milansql
        app.kubernetes.io/name: milansql
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: milansql
        image: milansql/milansql:5.7.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4406
          name: tcp
          protocol: TCP
        - containerPort: 4407
          name: mysql
          protocol: TCP
        - containerPort: 5433
          name: postgres
          protocol: TCP
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: graphql
          protocol: TCP
        env:
        - name: MILANSQL_PORT
          value: "4406"
        - name: MILANSQL_HTTP_PORT
          value: "8080"
        - name: MILANSQL_DATA_DIR
          value: "/milansql/data"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        volumeMounts:
        - name: data
          mountPath: /milansql/data
        - name: config
          mountPath: /milansql/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: milansql-config
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app: milansql
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
