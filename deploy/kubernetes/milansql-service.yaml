apiVersion: v1
kind: Service
metadata:
  name: milansql
  labels:
    app: milansql
    app.kubernetes.io/name: milansql
spec:
  type: ClusterIP
  selector:
    app: milansql
  ports:
  - name: tcp
    port: 4406
    targetPort: 4406
    protocol: TCP
  - name: mysql
    port: 4407
    targetPort: 4407
    protocol: TCP
  - name: postgres
    port: 5433
    targetPort: 5433
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: graphql
    port: 8081
    targetPort: 8081
    protocol: TCP
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: milansql-headless
  labels:
    app: milansql
spec:
  clusterIP: None
  selector:
    app: milansql
  ports:
  - name: tcp
    port: 4406
    targetPort: 4406
---
# LoadBalancer for external access (optional)
apiVersion: v1
kind: Service
metadata:
  name: milansql-external
  labels:
    app: milansql
  annotations:
    # Uncomment for cloud providers:
    # service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: milansql
  ports:
  - name: tcp
    port: 4406
    targetPort: 4406
  - name: http
    port: 8080
    targetPort: 8080
