version: '3.8'
services:
  milansql:
    build: .
    ports:
      - "4406:4406"
      - "4407:4407"
      - "5433:5433"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - milansql_data:/milansql/data
    environment:
      - MILANSQL_PORT=4406
      - MILANSQL_MYSQL_PORT=4407
      - MILANSQL_PG_PORT=5433
      - MILANSQL_HTTP_PORT=8080
      - MILANSQL_GRAPHQL_PORT=8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  milansql_data:
