<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilanSQL — Live Demo</title>
<style>
/* Dark theme, professional */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }

/* Top bar */
.topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
.topbar .logo { font-size: 1.2em; font-weight: 700; color: #ffd700; }
.topbar .version { color: #8b949e; font-size: 0.85em; }
.topbar .links { margin-left: auto; display: flex; gap: 12px; }
.topbar .links a { color: #58a6ff; text-decoration: none; font-size: 0.9em; }
.topbar .links a:hover { text-decoration: underline; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left sidebar: table browser */
.sidebar { width: 220px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-title { padding: 12px 14px; font-size: 0.8em; text-transform: uppercase; color: #8b949e; letter-spacing: 0.08em; border-bottom: 1px solid #21262d; }
.table-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.table-item { padding: 6px 14px; cursor: pointer; font-size: 0.9em; color: #c9d1d9; border-radius: 4px; margin: 1px 6px; transition: background 0.15s; }
.table-item:hover { background: #21262d; }
.table-item.active { background: #1f6feb44; color: #58a6ff; }
.schema-view { border-top: 1px solid #21262d; padding: 10px; max-height: 200px; overflow-y: auto; }
.schema-col { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.82em; }
.schema-col .col-name { color: #c9d1d9; }
.schema-col .col-type { color: #7ee787; font-family: monospace; }

/* Right: editor + results */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* SQL Editor area */
.editor-area { padding: 12px 16px; background: #0d1117; border-bottom: 1px solid #30363d; }
.editor-label { font-size: 0.8em; color: #8b949e; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.editor-label .hint { font-size: 0.85em; color: #484f58; }
#sql-editor {
    width: 100%; min-height: 80px; max-height: 200px;
    background: #161b22; color: #e6edf3; border: 1px solid #30363d;
    border-radius: 6px; padding: 10px 12px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 14px; resize: vertical; outline: none; tab-size: 2;
}
#sql-editor:focus { border-color: #388bfd; }

/* Toolbar */
.toolbar { padding: 8px 16px; display: flex; gap: 8px; align-items: center; background: #0d1117; border-bottom: 1px solid #30363d; }
.btn { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
.btn-secondary:hover { background: #30363d; }
.btn-danger { background: #da3633; color: #fff; }
.btn-danger:hover { background: #f85149; }
.exec-time { color: #8b949e; font-size: 0.82em; margin-left: auto; }

/* Example queries */
.examples { padding: 6px 16px; display: flex; gap: 6px; flex-wrap: wrap; background: #0d1117; border-bottom: 1px solid #21262d; }
.example-btn { padding: 3px 10px; border: 1px solid #30363d; border-radius: 12px; background: transparent; color: #8b949e; cursor: pointer; font-size: 0.78em; transition: all 0.15s; white-space: nowrap; }
.example-btn:hover { border-color: #58a6ff; color: #58a6ff; }

/* Results area */
.results-area { flex: 1; overflow: auto; padding: 0; }
.result-msg { padding: 12px 16px; font-family: monospace; font-size: 0.9em; }
.result-ok { color: #3fb950; }
.result-error { color: #f85149; background: #1a0a0a; border-left: 3px solid #f85149; }
.result-empty { color: #8b949e; }

/* Result table */
.result-table-wrap { padding: 12px 16px; overflow-x: auto; }
table.result { border-collapse: collapse; min-width: 100%; font-size: 0.88em; }
table.result thead th { background: #161b22; color: #8b949e; text-align: left; padding: 8px 12px; border-bottom: 2px solid #30363d; font-weight: 500; white-space: nowrap; }
table.result tbody td { padding: 7px 12px; border-bottom: 1px solid #21262d; color: #e6edf3; white-space: nowrap; }
table.result tbody tr:hover td { background: #161b22; }
table.result tbody td.null { color: #484f58; font-style: italic; }
.row-count { padding: 6px 16px; color: #8b949e; font-size: 0.82em; border-top: 1px solid #21262d; }

/* Status bar */
.statusbar { background: #238636; padding: 3px 16px; font-size: 0.78em; color: #fff; display: flex; gap: 16px; }
.statusbar span { opacity: 0.85; }

/* History panel */
.history-panel { display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #161b22; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">&#9889; MilanSQL</span>
  <span class="version">v5.0.0 &mdash; Browser Demo</span>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="sql-reference.html">SQL Reference</a>
    <a href="tutorial.html">Tutorial</a>
    <a href="https://github.com/haidari9819-lang/milansql">GitHub</a>
  </div>
</div>

<div class="main">
  <!-- Left: Table Browser -->
  <div class="sidebar">
    <div class="sidebar-title">Tables</div>
    <div class="table-list" id="table-list">
      <div style="padding:12px;color:#484f58;font-size:0.85em">Loading...</div>
    </div>
    <div class="schema-view" id="schema-view"></div>
  </div>

  <!-- Right: Editor + Results -->
  <div class="content">
    <!-- SQL Editor -->
    <div class="editor-area">
      <div class="editor-label">
        <span>SQL Editor</span>
        <span class="hint">Ctrl+Enter to execute</span>
      </div>
      <textarea id="sql-editor" spellcheck="false" placeholder="Enter SQL here...">SELECT * FROM employees</textarea>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn btn-primary" onclick="runQuery()">&#9654; Run</button>
      <button class="btn btn-secondary" onclick="formatQuery()">Format</button>
      <button class="btn btn-secondary" onclick="shareQuery()">&#128279; Share</button>
      <button class="btn btn-secondary" onclick="clearEditor()">Clear</button>
      <span class="exec-time" id="exec-time"></span>
    </div>

    <!-- Example queries -->
    <div class="examples">
      <span style="color:#484f58;font-size:0.78em;align-self:center">Examples:</span>
      <button class="example-btn" onclick="setQuery('SELECT * FROM employees')">SELECT *</button>
      <button class="example-btn" onclick="setQuery('SELECT dept, COUNT(*) AS count, AVG(salary) AS avg_salary FROM employees GROUP BY dept ORDER BY avg_salary DESC')">GROUP BY</button>
      <button class="example-btn" onclick="setQuery('SELECT e.name, e.salary, d.budget FROM employees e JOIN departments d ON e.dept = d.name WHERE e.salary > 80000')">JOIN</button>
      <button class="example-btn" onclick="setQuery('SELECT name, salary, RANK() OVER (ORDER BY salary DESC) AS rank FROM employees')">Window Fn</button>
      <button class="example-btn" onclick="setQuery(&quot;SELECT * FROM employees WHERE dept = 'Engineering' ORDER BY salary DESC&quot;)">WHERE</button>
      <button class="example-btn" onclick="setQuery('WITH top_earners AS (SELECT * FROM employees WHERE salary > 80000) SELECT * FROM top_earners ORDER BY salary DESC')">CTE</button>
      <button class="example-btn" onclick="setQuery('CREATE TABLE products (id INT, name TEXT, price REAL);\nINSERT INTO products VALUES (1, Widget, 9.99);\nINSERT INTO products VALUES (2, Gadget, 24.99);\nSELECT * FROM products')">Multi-stmt</button>
    </div>

    <!-- Results -->
    <div class="results-area" id="results-area">
      <div class="result-msg result-empty">Results will appear here. Press &#9654; Run or Ctrl+Enter.</div>
    </div>
    <div class="row-count" id="row-count"></div>
  </div>
</div>

<div class="statusbar">
  <span>MilanSQL v5.0.0 Browser Demo</span>
  <span id="status-tables">Tables: 0</span>
  <span>Mode: In-Memory (WASM Shim)</span>
  <span>&copy; 2026 MilanSQL</span>
</div>

<script src="wasm/milansql-wasm-shim.js"></script>
<script>
let db;
let queryHistory = JSON.parse(localStorage.getItem('milansql_history') || '[]');

// Init
MilanSQL.init().then(instance => {
    db = instance;
    refreshTableList();

    // Load shared query from URL
    const params = new URLSearchParams(location.search);
    if (params.get('sql')) {
        document.getElementById('sql-editor').value = decodeURIComponent(params.get('sql'));
    }
});

// Keyboard shortcut
document.getElementById('sql-editor').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runQuery();
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        const el = e.target;
        const start = el.selectionStart;
        el.value = el.value.substring(0, start) + '  ' + el.value.substring(el.selectionEnd);
        el.selectionStart = el.selectionEnd = start + 2;
    }
});

function runQuery() {
    const sql = document.getElementById('sql-editor').value.trim();
    if (!sql) return;

    const t0 = performance.now();

    // Execute statements separated by semicolons
    const stmts = sql.split(';').map(s => s.trim()).filter(s => s.length > 0);
    let lastResult = null;
    let error = null;

    for (const stmt of stmts) {
        const upper = stmt.toUpperCase().trim();
        if (upper.startsWith('SELECT') || upper.startsWith('SHOW')) {
            try {
                lastResult = MilanSQLEngine.select(stmt);
            } catch(e) {
                lastResult = { type: 'error', message: e.message };
                error = e.message;
                break;
            }
        } else {
            const r = MilanSQLEngine.execOne(stmt);
            if (r.type === 'error') { error = r.message; lastResult = r; break; }
            lastResult = r;
        }
    }

    const elapsed = (performance.now() - t0).toFixed(2);
    document.getElementById('exec-time').textContent = `${elapsed}ms`;

    // Save to history
    queryHistory.unshift({ sql, time: new Date().toISOString() });
    if (queryHistory.length > 50) queryHistory.pop();
    localStorage.setItem('milansql_history', JSON.stringify(queryHistory));

    // Display result
    displayResult(lastResult);
    refreshTableList();
}

function displayResult(result) {
    const area = document.getElementById('results-area');
    const rowCount = document.getElementById('row-count');

    if (!result) { area.innerHTML = '<div class="result-msg result-empty">No result</div>'; rowCount.textContent = ''; return; }

    if (result.type === 'error') {
        area.innerHTML = `<div class="result-msg result-error">ERROR: ${escapeHtml(result.message)}</div>`;
        rowCount.textContent = '';
        return;
    }

    if (result.type === 'ok') {
        area.innerHTML = `<div class="result-msg result-ok">&#10003; ${escapeHtml(result.message || 'OK')}</div>`;
        rowCount.textContent = '';
        return;
    }

    if (result.type === 'result') {
        if (!result.rows || result.rows.length === 0) {
            area.innerHTML = '<div class="result-msg result-empty">Query returned 0 rows</div>';
            rowCount.textContent = '0 rows';
            return;
        }
        let html = '<div class="result-table-wrap"><table class="result"><thead><tr>';
        for (const col of result.columns) html += `<th>${escapeHtml(col)}</th>`;
        html += '</tr></thead><tbody>';
        for (const row of result.rows) {
            html += '<tr>';
            for (const val of row) {
                if (val === null || val === 'NULL') html += '<td class="null">NULL</td>';
                else html += `<td>${escapeHtml(String(val))}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table></div>';
        area.innerHTML = html;
        rowCount.textContent = `${result.rows.length} row${result.rows.length !== 1 ? 's' : ''}`;
    }
}

function refreshTableList() {
    const tables = db ? db.getTables() : [];
    const list = document.getElementById('table-list');
    if (tables.length === 0) {
        list.innerHTML = '<div style="padding:12px;color:#484f58;font-size:0.85em">No tables yet</div>';
    } else {
        list.innerHTML = tables.map(t =>
            `<div class="table-item" onclick="showSchema('${t}')">${t}</div>`
        ).join('');
    }
    document.getElementById('status-tables').textContent = `Tables: ${tables.length}`;
}

function showSchema(name) {
    document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');

    const cols = db.getSchema(name);
    const schema = document.getElementById('schema-view');
    if (cols.length === 0) { schema.innerHTML = ''; return; }
    schema.innerHTML = `<div style="font-size:0.75em;color:#8b949e;margin-bottom:6px">${name}</div>` +
        cols.map(c => `<div class="schema-col"><span class="col-name">${c.name}</span><span class="col-type">${c.type}</span></div>`).join('');

    setQuery(`SELECT * FROM ${name}`);
}

function setQuery(sql) {
    document.getElementById('sql-editor').value = sql;
    document.getElementById('sql-editor').focus();
}

function clearEditor() { document.getElementById('sql-editor').value = ''; }

function formatQuery() {
    const el = document.getElementById('sql-editor');
    let sql = el.value;
    const kw = ['SELECT','FROM','WHERE','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','DROP TABLE','WITH','UNION','ON'];
    for (const k of kw) sql = sql.replace(new RegExp(`\\b${k}\\b`, 'gi'), '\n' + k);
    el.value = sql.trim();
}

function shareQuery() {
    const sql = document.getElementById('sql-editor').value;
    const url = location.origin + location.pathname + '?sql=' + encodeURIComponent(sql);
    navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!')).catch(() => prompt('Copy this link:', url));
}

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
